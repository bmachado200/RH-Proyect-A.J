<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente de RH</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="chat-container">
        <h1 id="chatTitle">💬 Asistente de RH</h1>
        
        <div class="document-selector">
            <label for="dbType">Consultar en:</label>
            <select id="dbType">
                <option value="internos">📄 Documentos Internos</option>
                <option value="contrato">📑 Contrato Colectivo</option>
            </select>
        </div>
        
        <div class="chat-box" id="chatBox">
            <!-- Mensajes aparecerán aquí -->
        </div>
        
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Escribe tu pregunta aquí..." autocomplete="off">
            <button id="sendButton">Enviar</button>
        </div>
    </div>
    
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
