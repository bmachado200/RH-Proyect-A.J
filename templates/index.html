<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente de RH</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1 class="chat-title">💬 Asistente de RH</h1>
            <div class="powered-by">
                Powered by Ollama/Llama3
                <div class="ollama-status">
                    <div class="status-indicator"></div>
                    <span class="status-text">Connected</span>
                </div>
            </div>
        </div>
        
        <div class="document-selector">
            <button class="source-button active" data-source="internos">
                📄 Documentos Internos
            </button>
            <button class="source-button" data-source="contrato">
                📑 Contrato Colectivo
            </button>
            <button class="language-toggle" title="Toggle Language">🌐</button>
        </div>
        
        <div class="chat-box" id="chatBox">
            <!-- Messages will appear here -->
        </div>
        
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Escribe tu pregunta aquí..." autocomplete="off">
            <button id="sendButton">Enviar</button>
        </div>
    </div>
    
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
